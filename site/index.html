<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFNEW Mirror</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09111f;
      --panel: rgba(10, 20, 38, 0.88);
      --line: rgba(126, 194, 255, 0.22);
      --text: #eff7ff;
      --muted: #9eb3ca;
      --accent: #7ec2ff;
      --accent-strong: #8af7d0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(70, 126, 255, 0.18), transparent 36%),
        radial-gradient(circle at bottom, rgba(68, 255, 200, 0.12), transparent 28%),
        linear-gradient(160deg, #04070d, var(--bg));
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(720px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.7;
      color: var(--muted);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(138, 247, 208, 0.26);
      background: rgba(138, 247, 208, 0.1);
      color: var(--accent-strong);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    code {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <div class="tag">CFNEW auto update</div>
    <h1>Waiting for the first release sync</h1>
    <p>
      This repository is ready to mirror the latest <code>cfnew</code> Pages
      release into the <code>site/</code> directory.
    </p>
    <p>
      After the GitHub Actions workflow runs successfully, this placeholder page
      will be replaced automatically by the newest files from <code>Pages.zip</code>.
    </p>
  </main>
</body>
</html>
