name: Auto Update CFNEW

on:
  schedule:
    # GitHub Actions cron uses UTC: 00:00 / 06:00 / 12:00 / 18:00.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update-cfnew
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make sync script executable
        run: chmod +x scripts/sync-cfnew.sh

      - name: Sync latest cfnew Pages release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO_OWNER: byJoey
          REPO_NAME: cfnew
          ASSET_NAME: Pages.zip
          TARGET_DIR: site
          VERSION_FILE: .cfnew-release-version
        run: ./scripts/sync-cfnew.sh

      - name: Commit and push changes
        run: |
          set -euo pipefail

          git config user.name "auto-update-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A site .cfnew-release-version

          if git diff --cached --quiet; then
            echo "No changes detected. Nothing to commit."
            exit 0
          fi

          release_version="$(cat .cfnew-release-version)"
          git commit -m "chore: sync cfnew ${release_version}"
          git push
